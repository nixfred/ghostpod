# Catppuccin Mocha
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Status bar
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[bg=#cba4f7,fg=#1e1e2e,bold] #S #[default] "
set -g status-right "#[bg=#313244,fg=#cdd6f4] %H:%M "
set -g status-left-length 20

# Windows
set -g window-status-current-style "bg=#89b4fa,fg=#1e1e2e,bold"
set -g window-status-current-format " #I #W "
set -g window-status-format " #I #W "
set -g window-status-style "fg=#6c7086"

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# Quality of life
set -sg escape-time 0
set -g set-clipboard on
set -g history-limit 10000
set -g base-index 1


# vi copy mode — press ^B [ to enter, v to select, y to yank to clipboard
set -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
